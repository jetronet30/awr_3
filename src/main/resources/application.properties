spring.application.name=awr_3

spring.servlet.multipart.max-file-size=150GB
spring.servlet.multipart.max-request-size=150GB
spring.servlet.multipart.file-size-threshold=0MB

spring.servlet.multipart.enabled=true
spring.threads.virtual.enabled=true

spring.messages.basename=messages
spring.messages.encoding=UTF-8

spring.jpa.hibernate.ddl-auto=update

logging.file.name=/var/log/awr_3/awr_3.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB